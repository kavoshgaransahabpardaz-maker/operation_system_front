version: "3.9"

# ── Production stack for BrokerAI ─────────────────────────────────────────────
#
# Services:
#   frontend  — React SPA served by Nginx (port 80)
#   api       — FastAPI + Uvicorn (internal only, proxied by frontend nginx)
#   worker    — Celery worker (OCR / classification / email)
#   beat      — Celery beat scheduler
#   postgres  — PostgreSQL 16
#   redis     — Redis 7
#   minio     — S3-compatible object storage
#
# Usage:
#   cp .env.prod.example .env.prod
#   # fill in secrets in .env.prod
#   docker compose -f docker-compose.prod.yml --env-file .env.prod up -d
#
# TLS: terminate TLS at the host level (Caddy / host Nginx / cloud LB)
#      and reverse-proxy to port 80 on the frontend container.

services:

  # ── Frontend (Nginx + built SPA) ──────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - brokerai

  # ── API ───────────────────────────────────────────────────────────────────
  api:
    build:
      context: ../operating_system_cb_back
      dockerfile: Dockerfile
    command: >
      uvicorn app.main:app
        --host 0.0.0.0
        --port 8000
        --workers 2
        --proxy-headers
        --forwarded-allow-ips='*'
    expose:
      - "8000"
    env_file: .env.prod
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    networks:
      - brokerai

  # ── Celery worker ─────────────────────────────────────────────────────────
  worker:
    build:
      context: ../operating_system_cb_back
      dockerfile: Dockerfile
    command: >
      celery -A app.core.celery_app worker
        --loglevel=info
        --concurrency=4
        -Q default,ocr,classification,matching,email
    env_file: .env.prod
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    restart: unless-stopped
    networks:
      - brokerai

  # ── Celery beat ───────────────────────────────────────────────────────────
  beat:
    build:
      context: ../operating_system_cb_back
      dockerfile: Dockerfile
    command: >
      celery -A app.core.celery_app beat
        --loglevel=info
        --scheduler django_celery_beat.schedulers:DatabaseScheduler
    env_file: .env.prod
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - brokerai

  # ── PostgreSQL ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - brokerai

  # ── Redis ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - brokerai

  # ── MinIO (S3-compatible storage) ─────────────────────────────────────────
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    # Console on 9001 — bind only to localhost or remove in production
    ports:
      - "127.0.0.1:9001:9001"
    restart: unless-stopped
    networks:
      - brokerai

volumes:
  postgres_data:
  redis_data:
  minio_data:

networks:
  brokerai:
    driver: bridge
